name: Deploy via SSH

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from the Actions tab

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install server deps
        run: npm ci --omit=dev

      - name: Install web deps
        working-directory: web
        run: npm ci

      - name: Build Vue app
        working-directory: web
        run: npm run build

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync files to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='data/summaries' \
            --exclude='node_modules' \
            --exclude='web/node_modules' \
            -e "ssh -i ~/.ssh/id_deploy -p ${SSH_PORT:-22} -o StrictHostKeyChecking=yes" \
            ./ "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Install prod deps + restart on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/id_deploy -p "${SSH_PORT:-22}" "$SSH_USER@$SSH_HOST" bash -se <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_PATH"
          # `.env` is NOT pushed by rsync; it must already exist on the server.
          if [ ! -f .env ]; then
            echo "[deploy] warning: .env missing on server — app will not generate summaries"
          fi
          # Install only prod deps (web/dist is already built in CI)
          npm ci --omit=dev
          # Restart via pm2; start it if this is the first deploy
          if pm2 describe daily-summary >/dev/null 2>&1; then
            pm2 reload daily-summary --update-env
          else
            pm2 start server/index.js --name daily-summary --time
            pm2 save
          fi
          REMOTE
